experiment:
  name: 2026-06-23_hrnet-large
  slug: hrnet-large
  date: 2026-06-23
  git_commit: ce697f485b7191529a1ea4fae2d2f36aebe5c09a-dirty
  note: '1-2M-param capacity comparison: does a modest 3-4x backbone bump help in
    the hard (dim x high-overlap) regime?'
  baseline: 2026-06-23_hrnet-small
seed: 0
simulator_config: configs/simulator.yaml
image:
  height: 256
  width: 256
model:
  in_channels: 2
  base_channels: 32
  num_branches: 3
  blocks_per_branch: 2
  head_mid_channels: 32
  heatmap_bias: -2.19
training:
  train_steps: 40000
  batch_size: 16
  lr: 0.002
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  heatmap_sigma: 1.5
  lr_warmup_steps: 1500
  variance_warmup_steps: 4000
  logvar_min: -10.0
  logvar_max: 6.0
  loss_weights:
    heatmap: 1.0
    offset: 1.0
    intensity: 1.0
  curriculum:
    enabled: true
    curriculum_ramp_steps: 20000
  eval_every: 1000
  checkpoint_every: 1000
  val:
    path: data/fixed_eval/val
  best_checkpoint:
    enabled: true
    metric: val_logratio_mae
    hard_corner_min_pairs: 50
  log_every: 100
benchmark:
  test_set_dir: data/benchmark_test_v1
  match_radius_px: 3.0
  match_method: greedy
  snr_bins:
  - 0.0
  - 2.0
  - 5.0
  - 10.0
  - 20.0
  - 50.0
  - .inf
  density_bins:
  - 0.0
  - 1.0
  - 3.0
  - 6.0
  - .inf
  density_radius_px: 4.0
  methods:
  - our_model
  - classical_per_channel_aperture
  - oracle_center_aperture_divide
  baseline:
    window_radius_px: 3.0
    bg_inner_px: 4.0
    bg_outer_px: 7.0
    detect_smooth_sigma: 1.2
    detect_threshold_rel: 4.0
    detect_footprint_px: 3
    min_separation_px: 2.0
  our_model:
    peak_threshold: 0.3
    nms_kernel: 3
    max_spots: 2000
    logvar_min: -10.0
    logvar_max: 6.0
  uncertainty:
    n_sigma_bins: 8
auto_benchmark: true
