# Experiment config: 2026-06-23_hrnet-validation
#
# An experiment == shared code at a pinned git commit + this config.
# Shared code lives only in src/spotpipe/. Do NOT add code to this folder.
#
# REAL training config (the non-smoke entry point), deliberately set to a
# VERY SHORT schedule. This is a PLUMBING VALIDATION of the full real-training +
# auto-benchmark pipeline -- NOT a science run. At 300 steps the metrics are
# meaningless; the only thing this run proves is that every stage fires:
#   * LR schedule (linear warmup -> cosine decay),
#   * variance warmup (fixed unit variance -> learned-logvar NLL at a fixed step),
#   * scene curriculum (ramp easy->hard, then HOLD at full difficulty),
#   * eval on the FIXED hard-corner eval set + best-checkpoint selection,
#   * auto-benchmark on the BEST checkpoint over that SAME fixed eval set.

experiment:
  name: 2026-06-23_hrnet-validation
  slug: hrnet-validation
  date: 2026-06-23
  git_commit: ce697f485b7191529a1ea4fae2d2f36aebe5c09a-dirty        # pinned commit of src/spotpipe/ for this run
  note: 'Very-short plumbing validation of the real training + auto-benchmark pipeline; not a science run.'
  baseline: null              # name/path of the experiment this diffs from, if any

# --- Config below overrides shared defaults. Keep it a DIFF from baseline. ---

seed: 0

# Full FV3000 detector + full scene ranges (256x256) come from the shared
# simulator config; only the image size is restated here for clarity. The
# detector constants are FIXED instrument constants (never curriculum-ramped).
simulator_config: configs/simulator.yaml

image:
  height: 256                 # input 256x256, 2 channels
  width: 256

# --------------------------------------------------------------------------- #
# MODEL -- small HRNet (~450k params; the smoke-size backbone).                 #
# --------------------------------------------------------------------------- #
model:
  in_channels: 2
  base_channels: 16
  num_branches: 3             # resolutions {1, 1/2, 1/4}
  blocks_per_branch: 2
  head_mid_channels: 32
  heatmap_bias: -2.19         # CenterNet focal-loss prior

# --------------------------------------------------------------------------- #
# TRAINING -- three independent schedules over one 300-step timeline.          #
# Short-run values chosen so EVERY stage fires (see README):                    #
#   - LR warmup ends at step 15, cosine decay begins.                           #
#   - Variance warmup: fixed unit variance for steps 1-40, learned logvar 41+.  #
#   - Curriculum reaches full difficulty at step 150, then HOLDS.               #
#   - >=4 eval/checkpoint events (steps 75,150,225,300).                         #
# --------------------------------------------------------------------------- #
training:
  train_steps: 300
  batch_size: 4
  lr: 0.002
  weight_decay: 0.0001
  grad_clip_norm: 1.0         # tame early multitask/NLL gradient spikes

  heatmap_sigma: 1.5          # tight blob: close spots stay separate peaks

  # (1) LR schedule: linear warmup then cosine decay to ~0 over the full run.
  lr_warmup_steps: 15         # ~5% of 300 steps

  # (2) Variance warmup: a fixed STEP COUNT (not a fraction). Fit the intensity
  #     MEAN under fixed unit variance first, then enable the heteroscedastic
  #     logvar NLL. Small here so both phases are exercised in a short run.
  variance_warmup_steps: 40
  logvar_min: -10.0           # in-loss logvar clamp (stability only; head unclamped)
  logvar_max: 6.0

  loss_weights:
    heatmap: 1.0
    offset: 1.0
    intensity: 1.0            # NO ratio/slope loss in phase 1 (CLAUDE.md)

  # (3) Scene curriculum: ramp scene difficulty (density / overlap / low-SNR /
  #     background) easy->hard, then HOLD at full difficulty. Scene only -- never
  #     detector constants; beta and PSF/registration stay at full range always.
  curriculum:
    enabled: true
    curriculum_ramp_steps: 150  # full difficulty by step 150, hold for the rest

  # Periodic validation on the FIXED hard-corner eval set, built ONCE (one seed /
  # one manifest) and reused for BOTH validation and the auto-benchmark.
  val:
    n_images: 8               # 5 forced hard corners + 3 full-range draws
    eval_every: 75
    seed: 12345

  checkpoint_every: 75        # >=4 checkpoint events over 300 steps
  best_checkpoint:
    enabled: true
    metric: val_logratio_mae  # selection metric (fallback: val_total_loss)

  log_every: 25

# --------------------------------------------------------------------------- #
# BENCHMARK -- end-of-run auto-benchmark on the BEST checkpoint, over the SAME  #
# fixed eval set. Mirrors configs/benchmark.yaml so the experiment is           #
# self-contained. Two runnable baselines + our model.                           #
# --------------------------------------------------------------------------- #
benchmark:
  match_radius_px: 3.0
  match_method: greedy
  snr_bins: [0.0, 2.0, 5.0, 10.0, 20.0, 50.0, .inf]
  density_bins: [0.0, 1.0, 3.0, 6.0, .inf]
  density_radius_px: 4.0
  methods: [our_model, classical_per_channel_aperture, oracle_center_aperture_divide]
  baseline:
    window_radius_px: 3.0
    bg_inner_px: 4.0
    bg_outer_px: 7.0
    detect_smooth_sigma: 1.2
    detect_threshold_rel: 4.0
    detect_footprint_px: 3
    min_separation_px: 2.0
  our_model:
    peak_threshold: 0.3
    nms_kernel: 3
    max_spots: 2000
    logvar_min: -10.0
    logvar_max: 6.0
  uncertainty:
    n_sigma_bins: 8

# Trigger the auto-benchmark at the end of training (on the BEST checkpoint).
auto_benchmark: true
