# Experiment config: 2026-06-23_hrnet-large
#
# An experiment == shared code at a pinned git commit + this config.
# Shared code lives only in src/spotpipe/. Do NOT add code to this folder.
#
# REAL overnight training run (prompt 5b). 1-2M-param HRNet -- the SAME architecture,
# heads, losses, target construction, simulator and benchmark as 2026-06-23_hrnet-small,
# only the backbone channels are WIDER (base_channels 16 -> 32, a config-only change).
# Question: does a modest 3-4x capacity bump help in the hard (dim x high-overlap)
# regime? Everything except model capacity is held identical to the small run
# (same seed -> same training stream, same fixed instrument, same FIXED val set).
#
# Runs on the A100 if available (device auto-detects CUDA), else CPU.

experiment:
  name: 2026-06-23_hrnet-large
  slug: hrnet-large
  date: 2026-06-23
  git_commit: ce697f485b7191529a1ea4fae2d2f36aebe5c09a-dirty   # pin the 5b shared-code commit before launch
  note: '1-2M-param capacity comparison: does a modest 3-4x backbone bump help in the hard (dim x high-overlap) regime?'
  baseline: 2026-06-23_hrnet-small

# --- Config below overrides shared defaults. Keep it a DIFF from baseline. ---

seed: 0          # same seed as the small run: identical training stream + identical
                 # fixed instrument -> the ONLY difference vs small is model capacity.

simulator_config: configs/simulator.yaml

image:
  height: 256
  width: 256

# --------------------------------------------------------------------------- #
# MODEL -- WIDE HRNet, ~1.53M params (3.4x the small run's 449k). Config-only    #
# widening: SAME architecture family, SAME heads, SAME losses, SAME targets --   #
# only base_channels changes (16 -> 32). Branch i has base_channels * 2**i       #
# channels; head_mid_channels is kept at 32 so the heads are unchanged and the    #
# comparison isolates backbone capacity.                                          #
# --------------------------------------------------------------------------- #
model:
  in_channels: 2
  base_channels: 32           # 16 -> 32: ~449k -> ~1,533,223 params (confirmed in-range, 1-2M)
  num_branches: 3
  blocks_per_branch: 2
  head_mid_channels: 32
  heatmap_bias: -2.19

# --------------------------------------------------------------------------- #
# TRAINING -- IDENTICAL full 40k-step schedule to the small run (only capacity   #
# differs). Ordering holds: LR warmup (1500) < variance warmup (4000) <          #
# curriculum full (20000, then HOLD).                                            #
# --------------------------------------------------------------------------- #
training:
  train_steps: 40000
  batch_size: 16
  lr: 0.002
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  heatmap_sigma: 1.5

  lr_warmup_steps: 1500
  variance_warmup_steps: 4000
  logvar_min: -10.0
  logvar_max: 6.0

  loss_weights:
    heatmap: 1.0
    offset: 1.0
    intensity: 1.0

  curriculum:
    enabled: true
    curriculum_ramp_steps: 20000

  eval_every: 1000
  checkpoint_every: 1000

  val:
    path: data/fixed_eval/val   # the SAME shared val set the small run selects on

  best_checkpoint:
    enabled: true
    metric: val_logratio_mae
    hard_corner_min_pairs: 50

  log_every: 100

# --------------------------------------------------------------------------- #
# BENCHMARK -- identical to the small run (frozen test set if present, else      #
# a clearly labelled PROVISIONAL val benchmark). Single agreed binning.          #
# --------------------------------------------------------------------------- #
benchmark:
  test_set_dir: data/benchmark_test_v1   # frozen test set (separate prompt); provisional-val fallback if absent
  match_radius_px: 3.0
  match_method: greedy
  snr_bins: [0.0, 2.0, 5.0, 10.0, 20.0, 50.0, .inf]
  density_bins: [0.0, 1.0, 3.0, 6.0, .inf]
  density_radius_px: 4.0
  methods: [our_model, classical_per_channel_aperture, oracle_center_aperture_divide]
  baseline:
    window_radius_px: 3.0
    bg_inner_px: 4.0
    bg_outer_px: 7.0
    detect_smooth_sigma: 1.2
    detect_threshold_rel: 4.0
    detect_footprint_px: 3
    min_separation_px: 2.0
  our_model:
    peak_threshold: 0.3
    nms_kernel: 3
    max_spots: 2000
    logvar_min: -10.0
    logvar_max: 6.0
  uncertainty:
    n_sigma_bins: 8

auto_benchmark: true
