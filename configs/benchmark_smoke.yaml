# Smoke benchmark v3: tiny counts, must generate in < a few seconds (pipeline test).
# Reuses smoke.yaml's simulator block (small images, same scene base) by reference, then
# OVERRIDES the detector with the MEASURED per-channel constants so smoke exercises the
# same detector as the full benchmark. No absolute paths.
#
# The GRID MUST MIRROR configs/benchmark.yaml (same snr_targets, same density_levels) --
# tests/test_density_coverage.py asserts it. If the smoke grid drifts off the real grid,
# the tests stop testing the thing that ships.

base_simulator_config: smoke.yaml   # relative to configs/; its `simulator:` block is used

# MEASURED detector (2026-07-13), identical to configs/benchmark.yaml. ch1 = LIPID
# (561 nm), ch2 = PROTEIN (488 nm) -- pipeline order, OPPOSITE the acquisition order.
simulator_overrides:
  detector:
    n_frames: 3
    poisson_gaussian_threshold: 20
    adc_max: 4095
    jitter_frac: 0.0
    ch1:   # LIPID, 561 nm, PMT 500 V
      gain: 6.63
      offset: 154.0
      excess_noise_factor: 1.0
      saturation_knee: 3941.0
      noise_floor_sigma: 1.760681686165901   # sqrt(3.1 ADU^2)
    ch2:   # PROTEIN, 488 nm
      gain: 40.0                       # CHOSEN (planned lower-voltage), NOT measured; measured=124.3
      offset: 154.0
      excess_noise_factor: 1.0
      saturation_knee: 3941.0
      noise_floor_sigma: 2.0976176963403033  # sqrt(4.4 ADU^2)

benchmark:
  seed: 0
  image:
    height: 80
    width: 80
  # A tiny SNR x density grid: 6 SNR targets x 7 densities = 42 cells, 2 imgs each.
  # v3 grid (see configs/benchmark.yaml and docs/benchmark_grid_requirements.md for the
  # measured evidence): SNR moved DOWN onto the live detection range (0.75 - 3.0, i.e.
  # 12.7 - 77.6 photons/spot), density extended UP to 0.025 where the mean
  # nearest-neighbour distance falls below the ch2 PSF FWHM and spots physically merge.
  # Constant SNR per cell, constant density per cell, uniform placement, no clustering.
  #
  # NOTE on the 80x80 smoke image: at density 0.025 that is only 160 spots, and the
  # border fraction is much larger than at 256x256 -- smoke checks the WIRING (constant
  # density/SNR invariants, no clipping, schema), never the SCIENCE.
  snr_targets:    [0.75, 1.0, 1.25, 1.5, 2.0, 3.0]
  density_levels: [0.0006, 0.002, 0.006, 0.012, 0.015, 0.02, 0.025]
  density_radius_px: 4.0
  images_per_cell: 2   # >1 so the constant-per-cell area-density + SNR invariants are exercised

  # A tiny alpha sweep incl. the null control (still exercises the 2x wiring).
  # A handful of sparse images per set gives enough spots to span the A1 window.
  alpha_values: [-0.6, 0.0, 0.6]
  images_per_alpha: 6
  null_control_multiplier: 3
  min_alpha_decades: 1.0
