# Frozen benchmark / test-set generation config.
#
# Drives scripts/make_benchmark_set.py -> data/benchmark_test_v1/. This produces
# the SEPARATE, FROZEN, stratified benchmark/test set used ONLY for final
# reporting and external-method comparison -- NEVER for checkpoint selection
# (that is the training-validation set, a DIFFERENT seed/manifest; keeping them
# distinct prevents test-set leakage). See CLAUDE.md + src/spotpipe/simulator/
# benchmark_set.py.
#
# The forward model (image / detector / scene base) is inherited from `base_config`
# so the FIXED instrument constants never drift from the training simulator. Only
# the stratification lives here.

base_config: configs/simulator.yaml      # image / detector / scene base (resolved & pinned into the manifest)
out_dir: data/benchmark_test_v1

benchmark_set:
  name: benchmark_test_v1

  # Distinct from any training/val seed: this is the held-out TEST set.
  seed: 20260623

  image: {height: 256, width: 256}

  # --- FROZEN binning (the single agreed binning; written verbatim into the
  #     manifest and used IDENTICALLY by every downstream metric/figure) -------
  # SNR: per-spot photon-domain peak SNR of the LIMITING channel
  #      (spotpipe.benchmark.features.peak_snr). 6 bins.
  snr_bins: [0.0, 2.0, 5.0, 10.0, 20.0, 50.0, .inf]
  # Density: local GT-neighbour count within density_radius_px. 4 bins.
  density_bin_edges: [0.0, 2.0, 5.0, 10.0, .inf]
  density_radius_px: 4.0
  # If true, IGNORE density_bin_edges above and compute quantile edges ONCE from
  # a pilot pass, then freeze them into manifest.json and use them everywhere.
  data_driven_density_edges: false
  data_driven_n_density_bins: 4
  data_driven_pilot_images: 24

  # --- beta groups: beta is FIXED per image to one of these and recorded;
  #     images span the groups roughly evenly --------------------------------
  beta_groups: [-0.6, -0.3, 0.0, 0.3, 0.6]

  # --- coverage targets ----------------------------------------------------- #
  # Min GROUND-TRUTH spots per SNR x density cell (we stratify on GT spots; no
  # method has run at generation time, so matched-pair counts are unknowable).
  min_gt_per_cell: 300
  min_images_per_beta_group: 10
  min_images_per_stress_flag: 6        # images per mandatory stress profile
  base_images: 56                      # broad-coverage images before targeted top-up
  max_attempts: 4000                   # hard cap on images before reporting failure

  # ratio-law nuisance ranges for non-imbalance images (channel-imbalance stress
  # profiles override alpha themselves).
  alpha:       {min: -0.7, max: 0.7}
  scatter_std: {min: 0.03, max: 0.25}

  # thresholds (log10 photons) for the data-driven channel-imbalance class label.
  channel_imbalance_bright_log10: 3.0
  channel_imbalance_dim_log10: 2.0
