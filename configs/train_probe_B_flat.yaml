# AUTO-GENERATED by scripts/make_probe_configs.py -- do not hand-edit.
#
# RARITY-HYPOTHESIS PROBE, arm B_flat of 2.  full_dim_bias = 1.0
#
# The two arms are IDENTICAL except for `training.intensity_window.full_dim_bias`. That is
# the whole experiment: if the intensity head's bright-end collapse is caused by the dim-
# biased sampler (only ~5% of trained spots exceed ~1000 photons), then flattening the
# sampler to log-uniform (dim_bias = 1.0) should shrink the bright+dense bias. If it does
# not move, rarity is refuted and the cause is in the loss/head.
#
# Short schedule (8000 steps, ramp 4000) -- this is a DIAGNOSTIC, not a headline model.
# Nothing trained from these configs may be shipped as a checkpoint.
#
# Read out with:  python scripts/bright_dense_probe.py --checkpoint <run-dir> --device cuda
