# Smoke config: tiny numbers, must finish < 60 s on Windows CPU.
# Same structure as default.yaml; only sizes shrink. No absolute paths ever.

run:
  n_images: 50
  seed: 0
  split: smoke

model:            # vendored build_spot_model block (deliberately tiny)
  in_channels: 2
  base_channels: 8
  num_branches: 3
  blocks_per_branch: 1
  head_mid_channels: 16
  heatmap_bias: -2.19

inference:
  adc_max: 4095.0
  peak_threshold: 0.3
  nms_kernel: 3
  max_spots: 512

simulator:        # vendored generate_dataset block (image/detector/scene)
  image:
    height: 64
    width: 64

  detector:       # FIXED instrument constants (never broadly randomised)
    n_frames: 3
    poisson_gaussian_threshold: 20
    adc_max: 4095
    jitter_frac: 0.0
    ch1:
      gain: 2.5
      offset: 100.0
      excess_noise_factor: 1.5
      saturation_knee: 2600.0
      noise_floor_sigma: 8.0
    ch2:
      gain: 6.0
      offset: 150.0
      excess_noise_factor: 1.8
      saturation_knee: 4200.0
      noise_floor_sigma: 11.0

  scene:          # widely randomised per image (values as in default.yaml)
    density:
      min: 0.0006
      max: 0.012
    oversample_dense_fraction: 0.3
    intensity:
      log10_min: 1.3
      log10_max: 3.9
      dim_bias: 1.6
    ratio_law:
      alpha:       {min: -0.7, max: 0.7}
      beta:        {min: -0.6, max: 0.6}
      scatter_std: {min: 0.03, max: 0.25}
    psf:
      sigma1:            {min: 1.0, max: 1.8}
      c2_sigma_mismatch: {min: 1.05, max: 1.35}
    registration_shift:
      max_px: 1.0
    background:
      level:              {min: 2.0,  max: 25.0}
      gradient_frac:      {min: 0.0,  max: 0.6}
      structure_frac:     {min: 0.0,  max: 0.5}
      structure_scale_px: {min: 16.0, max: 64.0}
      real_crop: null
    clustering:
      cluster_prob: 0.4
      n_clusters:       {min: 2, max: 8}
      cluster_sigma_px: {min: 6.0, max: 24.0}
