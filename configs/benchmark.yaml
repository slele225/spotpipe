# Benchmark configuration: matching gate, binning axes, method list, baselines.
#
# A SYNTHETIC-only benchmark (we hold the ground truth, so bias/variance are
# exactly measurable). All metrics are binned by the two difficulty axes -- SNR
# and spot density -- both 2-D and marginally. See CLAUDE.md: the central claim
# is unbiased, low-variance recovery of per-spot intensities and the I2/I1 ratio
# (and the ratio-law slope beta), especially in the dim x high-overlap corner.

benchmark:
  # --- matching: predicted spot <-> ground-truth spot, one-to-one, gated ---
  match_radius_px: 3.0           # max centre separation to call a match (pixels)
  match_method: greedy           # 'greedy' (nearest-first) or 'hungarian' (optimal)

  # --- binning axes (edges; last edge may be .inf for ">= lo") ---
  # SNR: per-spot photon-domain peak SNR of the LIMITING channel (see
  # benchmark/features.py for the exact definition). Dim spots fall in low bins.
  snr_bins: [0.0, 2.0, 5.0, 10.0, 20.0, 50.0, .inf]
  # Density: local GT-neighbour count within density_radius_px (local overlap).
  density_bins: [0.0, 1.0, 3.0, 6.0, .inf]
  density_radius_px: 4.0         # radius (px) for the local-neighbour density axis

  # --- methods to run (each is one adapter) ---
  # Honest names: the two baselines are APERTURE/naive photometry (not PSF fits),
  # and the oracle one is oracle-CENTRES only (intensities are still naive aperture
  # reads). External tools (decode, spotiflow, external_placeholder) are stubbed
  # until installed; listing one here logs a skip rather than aborting the run.
  methods: [our_model, classical_per_channel_aperture, oracle_center_aperture_divide]

  # --- naive baselines: aperture photometry (per channel) then divide ---
  baseline:
    window_radius_px: 3.0        # photometry aperture radius (px)
    bg_inner_px: 4.0             # local-background annulus inner radius (px)
    bg_outer_px: 7.0             # local-background annulus outer radius (px)
    detect_smooth_sigma: 1.2     # LoG smoothing sigma for classical detection
    detect_threshold_rel: 4.0    # detection threshold, in robust-noise sigmas
    detect_footprint_px: 3       # local-maximum footprint (px)
    min_separation_px: 2.0       # merge radius for per-channel detections

  # --- our model inference (peak-finding on the heatmap) ---
  our_model:
    peak_threshold: 0.3          # min heatmap probability for a detection
    nms_kernel: 3                # local-max NMS window (px)
    max_spots: 2000              # cap per image (highest-confidence peaks)
    logvar_min: -10.0            # derived-uncertainty clamp (matches the NLL)
    logvar_max: 6.0

  # --- CMEAnalysis (external detector) + aperture photometry -----------------
  # cmeanalysis_plus_aperture is OPT-IN (not in `methods` above): enable it via
  # --methods cmeanalysis_plus_aperture. CMEAnalysis is a LOCAL, EXTERNAL MATLAB
  # package (never vendored); its detections reach us only as the normalized CSV
  # below (image_id,x,y + optional score/A/slave_A/channel/native_I1/native_I2;
  # produce it with scripts/run_cmeanalysis.py). CME is detector/localizer ONLY --
  # canonical I1/I2 come from aperture+annulus photometry on the PHOTON images
  # (same estimator as the aperture baseline), never from CME native amplitudes.
  cmeanalysis:
    detections_csv: data/benchmark_test_v1/cme_detections/detections.csv
    detect_channel: 2             # CME master channel (layout/provenance only)
    p_detect_source: constant     # constant | A | score | one_minus_pval | neg_log10_pval
    window_radius_px: 3.0         # aperture radius (mirrors the aperture baseline)
    bg_inner_px: 4.0              # local-background annulus inner radius (px)
    bg_outer_px: 7.0             # local-background annulus outer radius (px)
    use_photon_images: true

  # --- Spotiflow (external detector) + aperture photometry -------------------
  # Two OPT-IN methods (not in `methods` above): enable via
  #   --methods spotiflow_general_plus_aperture
  #   --methods spotiflow_finetuned_spotpipe_synth_plus_aperture
  # Spotiflow is an EXTERNAL detector run in its own .venvs/spotiflow env; it
  # never enters the spotpipe import graph. Its detections reach the harness only
  # as the normalized CSV below (image_id,x,y,p_detect,source,model_variant,
  # detect_image), produced by scripts/run_spotiflow_predict.py from the RAW
  # detector image (raw_max). Spotiflow is detector/localizer ONLY -- canonical
  # I1/I2 come from aperture+annulus photometry on the PHOTON images (same
  # estimator as the aperture baseline), never from Spotiflow heatmaps.
  spotiflow:
    detect_image: raw_max         # pixelwise max(ch1_raw, ch2_raw) fed to Spotiflow
    window_radius_px: 3           # aperture radius (mirrors the aperture baseline)
    bg_inner_px: 5                # local-background annulus inner radius (px)
    bg_outer_px: 8                # local-background annulus outer radius (px)

    general:
      detections_csv: outputs/external/spotiflow/general_raw_max/detections.csv
      model_variant: general

    finetuned_spotpipe_synth:
      detections_csv: outputs/external/spotiflow/finetuned_spotpipe_synth_raw_max/detections.csv
      model_variant: finetuned_spotpipe_synth
      model_dir: external_models/spotiflow_finetuned_spotpipe_synth

  # --- SpotMAX (external detector) + aperture photometry ---------------------
  # OPT-IN method (not in `methods` above): enable via
  #   --methods spotmax_ai_plus_aperture
  # SpotMAX (Cell-ACDC) is run HEADLESS in its own env (`spotmax -p config.ini`);
  # it never enters the spotpipe import graph. Its output tables (0_detected_spots
  # / 1_valid_spots / 2_spotfit) are parsed into a neutral CSV (image_id,x,y,
  # p_detect,native_*) by scripts/convert_spotmax_output.py. SpotMAX is detector/
  # localizer ONLY -- canonical I1/I2 come from aperture+annulus photometry on the
  # PHOTON images (same estimator as the aperture baseline), never from SpotMAX
  # native intensities. detect_image=raw_max (pixelwise max of the two raw channels).
  spotmax:
    detections_csv: external_runs/spotmax/smoke/predictions/neutral_detections.csv
    detect_image: raw_max         # pixelwise max(ch1_raw, ch2_raw) fed to SpotMAX
    nonpositive: clamp            # clamp (keep+flag) | reject (drop+count)
    window_radius_px: 3.0         # aperture radius (mirrors the aperture baseline)
    bg_inner_px: 5.0              # local-background annulus inner radius (px)
    bg_outer_px: 8.0              # local-background annulus outer radius (px)

  # --- uncertainty calibration (our model only) ---
  uncertainty:
    n_sigma_bins: 8              # quantile bins for the predicted-sigma curve
