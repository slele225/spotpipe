# Full benchmark: real sizes. Reuses default.yaml's simulator block (256x256,
# vendored detector + scene ranges) by reference. Generation only -- no method
# runs, no slope fit, no metric (see src/spotpipe/benchmark/generate.py).

base_simulator_config: default.yaml   # relative to configs/; its `simulator:` block is used

benchmark:
  seed: 0
  # image size defaults to the base (256x256); override here if desired.

  # Family 1 -- SNR x density. SNR = frozen checkpoint bin edges (a cell is labelled
  # by its bin's lower edge, half-open [lower, next)). Density = CONSTANT AREA
  # DENSITY levels in spots/px (the knob AND the label; no clustering, uniform
  # placement), swept across and slightly beyond the training range [~0.0006,
  # ~0.012]. Full orthogonal grid: 6 SNR x 5 density = 30 cells.
  snr_edges:      [0, 2, 5, 10, 20, 50, inf]
  density_levels: [0.0006, 0.002, 0.006, 0.012, 0.015]
  density_radius_px: 4.0   # informational realised-neighbour stat only
  images_per_cell: 50

  # Family 2 -- curvature. Full alpha range + dense-near-zero (union, 0 once).
  # true_alpha is realised via pinned sim_log_slope = alpha / 2.
  alpha_values: [-1.2, -0.9, -0.6, -0.3, -0.15, -0.075, 0.0, 0.075, 0.15, 0.3, 0.6, 0.9, 1.2]
  images_per_alpha: 50
  null_control_multiplier: 3   # alpha=0 gets 3x images (tight null-control error bars)
  min_alpha_decades: 1.0       # warn if a set's A1 spread is narrower than this
