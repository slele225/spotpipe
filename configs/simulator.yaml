# FV3000 two-channel forward-model configuration.
#
# Two clearly separated blocks (see CLAUDE.md):
#   detector:  FIXED instrument constants (sampled ONCE per dataset, at most
#              narrowly jittered). Broad randomisation here is FORBIDDEN -- we do
#              NOT want the network to be gain-invariant.
#   scene:     WIDELY randomised domain-randomisation variables (per image).

image:
  height: 256
  width: 256

# --------------------------------------------------------------------------- #
# DETECTOR -- fixed instrument constants. The two channels are imaged at        #
# different PMT voltages: genuinely different gain and saturation behaviour.    #
# --------------------------------------------------------------------------- #
detector:
  n_frames: 3                      # integration count = 3 (mean of 3 scans)
  poisson_gaussian_threshold: 20   # P below this stays Poisson-exact at the gain step
  adc_max: 4095                    # 12-bit ADC ceiling
  jitter_frac: 0.0                 # narrow per-instrument jitter ONLY (<=0.25); 0 = off.
                                   # Broad randomisation of these is forbidden.

  # Channel 1: lower PMT voltage -> lower gain, rolls off softly below full scale.
  ch1:
    gain: 2.5                      # counts per photon-proportional unit
    offset: 100.0                  # analog baseline (counts)
    excess_noise_factor: 1.5       # F_1 > 1 (PMT stochastic-gain noise)
    saturation_knee: 2600.0        # soft tanh knee (gained units); asymptote < 4095
    noise_floor_sigma: 8.0         # read-noise floor per scan (counts)

  # Channel 2: higher PMT voltage -> ~2.4x the gain; saturates first and its
  # brightest pixels also hit the 4095 hard clip (knee asymptote > 4095).
  ch2:
    gain: 6.0
    offset: 150.0
    excess_noise_factor: 1.8
    saturation_knee: 4200.0
    noise_floor_sigma: 11.0

# --------------------------------------------------------------------------- #
# SCENE -- widely randomised domain randomisation (drawn per image).           #
# --------------------------------------------------------------------------- #
scene:
  # Spots per pixel, log-uniform; the dense/high-overlap regime is over-sampled.
  density:
    min: 0.0006                    # ~40 spots in 256x256 (sparse)
    max: 0.012                     # ~785 spots in 256x256 (dense, overlapping)
  oversample_dense_fraction: 0.3   # fraction of images forced to the upper density octave

  # Channel-1 total integrated intensity A_1 (log10 photons). dim_bias > 1
  # over-samples the dim tail relative to log-uniform.
  intensity:
    log10_min: 1.3                 # ~20 photons (dim tail)
    log10_max: 3.9                 # ~7900 photons (near channel-1 saturation)
    dim_bias: 1.6                  # >1 over-samples dim spots; 1 == log-uniform

  # Biological ratio law, drawn PER IMAGE:
  #   log A_2 = log A_1 + alpha + beta*log A_1 + N(0, scatter_std)
  # beta is the slope the downstream analysis recovers; it INCLUDES 0 and
  # negative so the network never learns it as a prior. Range [-0.6, 0.6] gives
  # observed log A2-vs-log A1 slopes (1+beta) of ~0.4-1.6: wide enough to
  # comfortably bracket the real biological effect with margin (so the real
  # value sits in the well-sampled interior) and to draw a long, convincing
  # recovered-beta-vs-true-beta identity line for the unbiasedness claim.
  # REVISIT once the real effect size is known -- if real beta could be larger,
  # widen further.
  ratio_law:
    alpha:       {min: -0.7, max: 0.7}
    beta:        {min: -0.6, max: 0.6}
    scatter_std: {min: 0.03, max: 0.25}

  # Per-channel PSF sigma with a deliberate C1-vs-C2 mismatch (ch2 wider).
  # sigma will eventually come from bead images; randomised widely for now.
  psf:
    sigma1:            {min: 1.0, max: 1.8}
    c2_sigma_mismatch: {min: 1.05, max: 1.35}

  # Per-channel sub-pixel registration offset (channel misregistration).
  registration_shift:
    max_px: 1.0

  # Parametric background (photon units): flat level + gradient + low-freq structure.
  # `real_crop` is a phase-2 hook (line/row-correlated scanner noise); unused now.
  background:
    level:              {min: 2.0,  max: 25.0}
    gradient_frac:      {min: 0.0,  max: 0.6}
    structure_frac:     {min: 0.0,  max: 0.5}
    structure_scale_px: {min: 16.0, max: 64.0}
    real_crop: null

  # Geometry: a fraction of images use clustered spots (high local overlap).
  clustering:
    cluster_prob: 0.4
    n_clusters:       {min: 2, max: 8}
    cluster_sigma_px: {min: 6.0, max: 24.0}
